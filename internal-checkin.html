<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internal Check In</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2 class="form-title">INTERNAL CHECK IN</h2>

<div class="form-group">
<label>NIK</label>
<input type="text" id="nik">
</div>

<div class="form-group">
<label>Nama</label>
<input type="text" id="nama">
</div>

<div class="form-group">
<label>Departemen / Bagian</label>
<input type="text" id="departemen">
</div>

<div class="form-group">
<label>Asal Factory</label>
<input type="text" id="factory">
</div>

<div class="form-group">
<label>No Polisi / Kendaraan</label>
<input type="text" id="plat">
</div>

<div class="form-group">
<label>Bertamu Dengan / PIC</label>
<input type="text" id="pic">
</div>

<div class="form-group">
<label>Keperluan</label>
<textarea id="keperluan"></textarea>
</div>

<button class="btn blue" id="submitBtn" disabled>
CHECK IN
</button>

</div>

<div class="popup hidden" id="popup">
<div class="popup-box">

<h2>CHECK IN BERHASIL</h2>

<p id="popupText"></p>

<div class="popup-time" id="popupTime"></div>

<button class="btn blue" onclick="window.location.href='index.html'">
OK
</button>

</div>
</div>

<script type="module">

import {
db,
collection,
addDoc
} from './firebase.js';

const submitBtn = document.getElementById('submitBtn');

const inputs = document.querySelectorAll(
'input, textarea'
);

function validateForm(){

let valid = true;

inputs.forEach((input)=>{

if(input.value.trim() === ''){
valid = false;
}

});

submitBtn.disabled = !valid;

}

inputs.forEach((input)=>{
input.addEventListener('input', validateForm);
});

submitBtn.addEventListener('click', async ()=>{

const now = new Date();

await addDoc(collection(db,'internal_visitors'),{

nik:
document.getElementById('nik').value,

nama:
document.getElementById('nama').value,

departemen:
document.getElementById('departemen').value,

factory:
document.getElementById('factory').value,

plat:
document.getElementById('plat').value,

pic:
document.getElementById('pic').value,

keperluan:
document.getElementById('keperluan').value,

tanggal_masuk:
now.toLocaleDateString(),

jam_masuk:
now.toLocaleTimeString(),

jam_keluar:'-',

status:'IN'

});

document.getElementById('popup')
.classList.remove('hidden');

document.getElementById('popupText')
.innerHTML =
'NIK : <b>' +
document.getElementById('nik').value +
'</b>';

document.getElementById('popupTime')
.innerText =
now.toLocaleTimeString();

});

</script>

</body>
</html>
